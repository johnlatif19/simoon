    <style>
        /* Rate Page Specific Styles */
        .rate-wrapper {
            min-height: 100vh;
            background: var(--gradient-bg-light);
            padding-top: 100px;
        }
        
        .rate-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* Add Review Section */
        .add-review-section {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }
        
        .add-review-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .add-review-header h2 {
            color: var(--gold-primary);
            font-size: 2rem;
        }
        
        .add-review-header p {
            color: var(--text-secondary);
        }
        
        /* Rating Stars Input */
        .rating-input-container {
            text-align: center;
            margin: 1.5rem 0;
        }
        
        .rating-stars-input {
            display: inline-flex;
            gap: 0.5rem;
            direction: ltr;
        }
        
        .rating-stars-input i {
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--gray-400);
        }
        
        .rating-stars-input i:hover,
        .rating-stars-input i.selected {
            color: #D4AF37;
            transform: scale(1.1);
        }
        
        .rating-label {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        /* Review Form */
        .review-form {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        /* Reviews Section */
        .reviews-section {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }
        
        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .reviews-header h2 {
            font-size: 1.5rem;
        }
        
        .reviews-header h2 i {
            color: var(--gold-primary);
        }
        
        .rating-summary {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(212, 175, 55, 0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
        }
        
        .average-rating {
            font-size: 2rem;
            font-weight: 800;
            color: var(--gold-primary);
        }
        
        .total-reviews {
            color: var(--text-secondary);
        }
        
        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--gray-100);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gold-primary);
            color: #2c1810;
            border-color: var(--gold-primary);
        }
        
        /* Reviews Grid */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .review-card {
            background: var(--white);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            border: 1px solid var(--border-color);
        }
        
        .review-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .reviewer-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c1810;
        }
        
        .reviewer-details h4 {
            margin-bottom: 0.2rem;
            font-size: 1rem;
        }
        
        .reviewer-country {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .review-rating {
            color: #D4AF37;
            font-size: 0.9rem;
        }
        
        .review-message {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 15px;
            line-height: 1.7;
            color: var(--text-primary);
        }
        
        .review-message i {
            color: #D4AF37;
            margin-left: 0.5rem;
            opacity: 0.7;
        }
        
        .review-date {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        /* Empty State */
        .empty-reviews {
            text-align: center;
            padding: 4rem;
        }
        
        .empty-reviews i {
            font-size: 4rem;
            color: var(--gray-400);
            margin-bottom: 1rem;
        }
        
        /* Success Message */
        .success-message {
            background: #4caf50;
            color: white;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .rate-container {
                padding: 1rem;
            }
            .add-review-section,
            .reviews-section {
                padding: 1rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .reviews-grid {
                grid-template-columns: 1fr;
            }
            .rating-stars-input i {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="rate-wrapper">
        <div class="rate-container">
            <!-- Add Review Section -->
            <div class="add-review-section">
                <div class="add-review-header">
                    <h2><i class="fas fa-star"></i> شاركنا تجربتك</h2>
                    <p>نحن نهتم برأيك! شاركنا تجربتك مع رحلة في مصر</p>
                </div>
                
                <form id="reviewForm" class="review-form">
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="reviewName" class="form-input" placeholder="الاسم الكامل" required>

                        <div class="form-group">
                            <input type="text" id="reviewCountry" class="form-input" placeholder="الدولة" required>

                    <div class="rating-input-container">
                        <div class="rating-stars-input" id="ratingStars">
                            <i class="far fa-star" data-rating="1"></i>
                            <i class="far fa-star" data-rating="2"></i>
                            <i class="far fa-star" data-rating="3"></i>

                    <div class="form-group">
                        <textarea id="reviewMessage" class="form-textarea" rows="5" placeholder="شاركنا تجربتك مع الرحلة... ماذا أعجبك؟ ماذا تقترح؟" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" id="submitReviewBtn">
                        <i class="fas fa-paper-plane"></i> إرسال التقييم
                    </button>

            <!-- Reviews Section -->
            <div class="reviews-section">
                <div class="reviews-header">
                    <h2><i class="fas fa-comments"></i> آراء عملائنا</h2>
                    <div class="rating-summary" id="ratingSummary">
                        <div class="average-rating">0.0</div>
                        <div class="total-reviews">(0 تقييم)</div>
                    </div>
                </div>
                
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-filter="all">الكل</button>
                    <button class="filter-btn" data-filter="5">★★★★★ (5)</button>
                    <button class="filter-btn" data-filter="4">★★★★☆ (4+)</button>
                    <button class="filter-btn" data-filter="3">★★★☆☆ (3+)</button>
                </div>
                
                <div id="reviewsGrid" class="reviews-grid">

    <script>
        // State
        let allRatings = [];
        let currentFilter = 'all';
        let selectedRating = 0;
        
        // DOM Elements
        const stars = document.querySelectorAll('#ratingStars i');
        const ratingInput = document.getElementById('reviewRating');
        const ratingLabel = document.getElementById('ratingLabel');
        const reviewForm = document.getElementById('reviewForm');
        const reviewsGrid = document.getElementById('reviewsGrid');
        const ratingSummary = document.getElementById('ratingSummary');
        
        // Rating labels
        const ratingLabels = {
            0: 'اختر تقييمك',
            1: 'سيء - لم تعجبني الرحلة',
            2: 'مقبول - يمكن أن يكون أفضل',
            3: 'جيد - رحلة لطيفة',
            4: 'جيد جداً - أوصي بها',
            5: 'ممتاز - تجربة لا تُنسى!'
        };
        
        // Initialize rating stars
        function initRatingStars() {
            stars.forEach(star => {
                star.addEventListener('click', function() {
                    const rating = parseInt(this.getAttribute('data-rating'));
                    selectedRating = rating;
                    ratingInput.value = rating;
                    ratingLabel.textContent = ratingLabels[rating];
                    
                    // Update stars UI
                    stars.forEach((s, index) => {
                        if (index < rating) {
                            s.className = 'fas fa-star selected';
                        } else {
                            s.className = 'far fa-star';
                        }
                    });
                });
                
                star.addEventListener('mouseover', function() {
                    const rating = parseInt(this.getAttribute('data-rating'));
                    stars.forEach((s, index) => {
                        if (index < rating) {
                            s.className = 'fas fa-star';
                        } else {
                            s.className = 'far fa-star';
                        }
                    });
                });
                
                star.addEventListener('mouseout', function() {
                    stars.forEach((s, index) => {
                        if (index < selectedRating) {
                            s.className = 'fas fa-star selected';
                        } else {
                            s.className = 'far fa-star';
                        }
                    });
                });
            });
        }
        
        // Load ratings from API
        async function loadRatings() {
            try {
                const response = await fetch('/api/v1/ratings');
                if (response.ok) {
                    allRatings = await response.json();
                    updateRatingSummary();
                    filterAndDisplayRatings();
                } else {
                    showError('فشل تحميل التقييمات');
                }
            } catch (error) {
                console.error('Error loading ratings:', error);
                showError('حدث خطأ في تحميل التقييمات');
            }
        }
        
        // Update rating summary (average and total)
        function updateRatingSummary() {
            if (allRatings.length === 0) {
                ratingSummary.innerHTML = `
                    <div class="average-rating">0.0</div>
                    <div class="total-reviews">(0 تقييم)</div>
                `;
                return;
            }
            
            const total = allRatings.length;
            const sum = allRatings.reduce((acc, r) => acc + r.rating, 0);
            const average = (sum / total).toFixed(1);
            
            ratingSummary.innerHTML = `
                <div class="average-rating">${average}</div>
                <div class="total-reviews">(${total} ${total === 1 ? 'تقييم' : 'تقييمات'})</div>
            `;
        }
        
        // Filter and display ratings
        function filterAndDisplayRatings() {
            let filtered = [...allRatings];
            
            switch (currentFilter) {
                case '5':
                    filtered = filtered.filter(r => r.rating === 5);
                    break;
                case '4':
                    filtered = filtered.filter(r => r.rating >= 4);
                    break;
                case '3':
                    filtered = filtered.filter(r => r.rating >= 3);
                    break;
                default:
                    break;
            }
            
            // Sort by date (newest first)
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            displayRatings(filtered);
        }
        
        // Display ratings in grid
        function displayRatings(ratings) {
            if (ratings.length === 0) {
                reviewsGrid.innerHTML = `
                    <div class="empty-reviews" style="grid-column: 1/-1;">
                        <i class="fas fa-comment-dots"></i>
                        <h3>لا توجد تقييمات بعد</h3>
                        <p>كن أول من يضيف تقييماً!</p>
                    </div>
                `;
                return;
            }
            
            reviewsGrid.innerHTML = ratings.map(rating => {
                const initial = rating.name ? rating.name.charAt(0).toUpperCase() : '?';
                const date = formatDate(rating.createdAt);
                
                return `
                    <div class="review-card" data-rating="${rating.rating}">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="reviewer-avatar">${escapeHtml(initial)}</div>
                                <div class="reviewer-details">
                                    <h4>${escapeHtml(rating.name)}</h4>
                                    <div class="reviewer-country">
                                        <i class="fas fa-map-marker-alt"></i> ${escapeHtml(rating.country)}
                                    </div>
                                </div>
                            </div>
                            <div class="review-rating">
                                ${generateStarRating(rating.rating)}
                            </div>
                        </div>
                        <div class="review-message">
                            <i class="fas fa-quote-right"></i>
                            <p>${escapeHtml(rating.message)}</p>
                        </div>
                        <div class="review-date">
                            <i class="far fa-calendar-alt"></i>
                            <span>${date}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Generate star rating display
        function generateStarRating(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<i class="fas fa-star"></i>';
                } else if (i - 0.5 <= rating) {
                    stars += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    stars += '<i class="far fa-star"></i>';
                }
            }
            return stars;
        }
        
        // Submit review
        async function submitReview(event) {
            event.preventDefault();
            
            const name = document.getElementById('reviewName').value.trim();
            const country = document.getElementById('reviewCountry').value.trim();
            const rating = parseInt(ratingInput.value);
            const message = document.getElementById('reviewMessage').value.trim();
            
            // Validation
            if (!name) {
                utils.showToast('الرجاء إدخال الاسم', 'error');
                return;
            }
            
            if (!country) {
                utils.showToast('الرجاء إدخال الدولة', 'error');
                return;
            }
            
            if (!rating || rating === 0) {
                utils.showToast('الرجاء اختيار تقييم', 'error');
                return;
            }
            
            if (!message || message.length < 10) {
                utils.showToast('الرجاء كتابة رسالة لا تقل عن 10 أحرف', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitReviewBtn');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
            
            const reviewData = {
                name: name,
                country: country,
                rating: rating,
                message: message,
                createdAt: new Date().toISOString()
            };
            
            try {
                const response = await fetch('/api/v1/ratings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(reviewData)
                });
                
                if (response.ok) {
                    // Show success message
                    const successMsg = document.getElementById('formSuccessMessage');
                    successMsg.style.display = 'block';
                    
                    // Reset form
                    reviewForm.reset();
                    selectedRating = 0;
                    ratingInput.value = '';
                    stars.forEach(star => star.className = 'far fa-star');
                    ratingLabel.textContent = ratingLabels[0];
                    
                    // Reload ratings
                    await loadRatings();
                    
                    // Hide success message after 3 seconds
                    setTimeout(() => {
                        successMsg.style.display = 'none';
                    }, 3000);
                    
                    utils.showToast('✅ تم إضافة تقييمك بنجاح! شكراً لك.', 'success');
                    
                } else {
                    const error = await response.json();
                    utils.showToast(error.message || '❌ حدث خطأ في إرسال التقييم', 'error');
                }
            } catch (error) {
                console.error('Submit error:', error);
                utils.showToast('❌ حدث خطأ في الاتصال بالخادم', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }
        
        // Show error in grid
        function showError(message) {
            reviewsGrid.innerHTML = `
                <div class="empty-reviews" style="grid-column: 1/-1;">
                    <i class="fas fa-exclamation-triangle" style="color: #dc2626;"></i>
                    <h3>حدث خطأ</h3>
                    <p>${escapeHtml(message)}</p>
                    <button onclick="loadRatings()" class="btn btn-primary" style="margin-top: 1rem;">
                        <i class="fas fa-sync-alt"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }
        
        // Format date
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '-';
            return date.toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Initialize filters
        function initFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-filter');
                    filterAndDisplayRatings();
                });
            });
        }
        
        // Dark Mode
        function initDarkMode() {
            const darkModeBtn = document.getElementById('darkModeBtn');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                darkModeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            darkModeBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkNow);
                darkModeBtn.innerHTML = isDarkNow ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        
        // Language System
        let currentLang = localStorage.getItem('language') || 'ar';
        
        function updateLanguage() {
            const langBtn = document.getElementById('langBtn');
            if (langBtn) {
                langBtn.textContent = currentLang === 'ar' ? 'EN' : 'AR';
            }
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
        }
        
        function initLanguage() {
            const langBtn = document.getElementById('langBtn');
            if (langBtn) {
                langBtn.addEventListener('click', () => {
                    currentLang = currentLang === 'ar' ? 'en' : 'ar';
                    localStorage.setItem('language', currentLang);
                    updateLanguage();
                });
            }
            updateLanguage();
        }
        
        // Mobile menu
        function initMobileMenu() {
            const navToggle = document.querySelector('.nav-toggle');
            const navMenu = document.querySelector('.nav-menu');
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
                document.querySelectorAll('.nav-menu a').forEach(link => {
                    link.addEventListener('click', () => navMenu.classList.remove('active'));
                });
            }
        }
        
        // Navbar scroll effect
        function initNavbarScroll() {
            const navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        }
        
        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            initLanguage();
            initMobileMenu();
            initNavbarScroll();
            initRatingStars();
            initFilters();
            loadRatings();
            
            reviewForm.addEventListener('submit', submitReview);
        });
    </script>
</body>
</html>
